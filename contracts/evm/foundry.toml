[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
cache   = true
cache_path = "cache"

solc_version   = "0.8.24"
optimizer      = true
optimizer_runs = 200
evm_version    = "cancun"

extra_output = ["storageLayout", "metadata"]

[rpc_endpoints]
base            = "${BASE_RPC_URL}"
base-sepolia    = "${BASE_SEPOLIA_RPC_URL}"
mainnet         = "${MAINNET_RPC_URL}"
sepolia         = "${SEPOLIA_RPC_URL}"

[etherscan]
# Base uses Basescan — same Etherscan API key format
base            = { key = "${ETHERSCAN_API_KEY}", chain = 8453, url = "https://api.basescan.org/api" }
base-sepolia    = { key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
mainnet         = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
sepolia         = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
