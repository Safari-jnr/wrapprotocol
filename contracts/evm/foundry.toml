[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
cache   = true
cache_path = "cache"

# Solidity compiler settings
solc_version = "0.8.24"
optimizer    = true
optimizer_runs = 200   # balanced between deployment cost and call cost

# EVM version — cancun is safe for Sepolia and Ethereum mainnet post-Dencun
evm_version = "cancun"

# Extra output — helps with verification and debugging
extra_output = ["storageLayout", "metadata"]

[rpc_endpoints]
# Set via environment variables — never hardcode RPC keys
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
base    = "${BASE_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
